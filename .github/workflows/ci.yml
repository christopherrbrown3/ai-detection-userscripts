name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: python -m pip install -r training/requirements.txt
      - run: npm ci --ignore-scripts
      - run: python -m compileall -q training scripts
      - run: python -m unittest discover -s tests -p 'test_*.py' -v
      - run: npm test
      - run: python scripts/build_userscripts.py --check
      - run: node --check linkedin-ai-heuristic.userscripts.user.js
      - run: node --check x-ai-heuristic.userscripts.user.js
      - run: node --check reddit-ai-heuristic.userscripts.user.js
